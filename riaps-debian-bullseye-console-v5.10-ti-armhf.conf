	avahi-utils	\
	bash-completion	\
	bc	\
	bluetooth	\
	bsdmainutils	\
	btrfs-progs	\
	ca-certificates	\
	cloud-guest-utils	\
	curl	\
	device-tree-compiler	\
	dosfstools	\
	git	\
	gnupg	\
	gpiod   \
	hexedit	\
	hostapd	\
	htop	\
	i2c-tools	\
	initramfs-tools	\
	iw	\
	less   \
	libgpiod-dev \
	libiio-utils \
	libinline-files-perl	\
	libnss-mdns	\
	libnss-systemd	\
	libpam-systemd	\
	linux-base	\
	locales	\
	nano    \
	net-tools	\
	openssh-server	\
	pastebinit	\
	patch	\
	rsync	\
	ssl-cert	\
	sudo	\
	tio     \
	tmux    \
	tree    \
	u-boot-tools	\
	unzip	\
	usb-modeswitch	\
	usbutils	\
	vim	\
	wget	\
	wireguard-tools \
	wpasupplicant	\
"

#
#deb_exclude=""

deb_components="main contrib non-free"
