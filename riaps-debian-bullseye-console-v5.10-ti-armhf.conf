##
rfs_username="riaps"
rfs_fullname="RIAPS App Developer"
rfs_password="riaps"
rfs_hostname="BeagleBone"
rfs_root_password="root"
#rfs_startup_scripts="enable"
#rfs_opt_scripts="https://github.com/RobertCNelson/boot-scripts"
#rfs_default_desktop=""
#rfs_desktop_background=""
rfs_default_locale="en_US.UTF-8"
rfs_etc_dogtag="BeagleBoard.org Debian Bullseye Console Image"
rfs_console_banner="Support: https://bbb.io/debian"
rfs_console_user_pass="enable"
rfs_ssh_banner="Support: https://bbb.io/debian"
rfs_ssh_user_pass="enable"
rfs_use_systemdnetworkd="enable"
##
##enable kernel repo: http://repos.rcn-ee.com/(debian|ubuntu)
repo_rcnee="enable"
repo_rcnee_arch="armhf"
#
# RIAPS Notes:
# Removed (was in Nelson's): 
# bb-code-server bb-node-red-installer bb-u-boot-am57xx-evm
# linux-image-5.10.65-ti-r30
#
repo_rcnee_pkg_list="	\
	bbb.io-kernel-5.10-ti	\
	bb-bbai-firmware	\
	bb-beagle-config	\
	bb-beagle-version	\
	bb-cape-overlays	\
	bb-usb-gadgets	\
	bb-u-boot-am335x-evm	\
	bb-u-boot-am335x-evm-blank	\
	bb-wl18xx-firmware	\
	bb-wlan0-defaults	\
	generic-sys-mods	\
	gt	\
	libusbgx	\
	linux-image-5.10.65-ti-rt-r31	\
	overlayroot	\
	ti-pru-cgt-v2.3	\
	ti-pru-software	\
	umtp-responder	\
"

##
repo_rcnee_pkg_version="5.10.65-ti-rt-r31"
repo_rcnee_cmem_version="4.20.00.01"
include_firmware="enable"
#
chroot_COPY_SETUP_SDCARD="enable"
chroot_before_hook=""
chroot_after_hook=""
early_chroot_script="riaps_setup.sh"
chroot_script="riaps.sh"
#chroot_script="beagleboard.org-bullseye.sh"
chroot_post_uenv_txt=""
chroot_tarball="disable"
keep_ssh_keys="enable"
