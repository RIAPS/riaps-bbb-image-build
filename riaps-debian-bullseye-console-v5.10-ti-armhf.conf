##
release="11.1"
image_type="console"
##
##Debootstrap: https://wiki.debian.org/Debootstrap
##
##debootstrap --arch=${deb_arch} --include=${deb_include} --exclude=${deb_exclude} \
##--components=${deb_components} --foreign ${deb_codename} /tmp/tmp.dir/ http://${deb_mirror}
##
deb_distribution="debian"
deb_codename="bullseye"
deb_arch="armhf"
#
# RIAPS Notes:
# Removed (was in Nelson's): 
# firmware-atheros firmware-brcm80211 firmware-iwlwifi
# firmware-libertas firmware-realtek firmware-misc-nonfree 
# firmware-ti-connectivity firmware-zd1211
#
# Removed (was in riaps-focal.conf)
# openresolv
#
